name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      CI: true
      SKIP_PG_TESTS: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build
        run: pnpm turbo run build --filter='...[HEAD^1]' --concurrency=100%

      - name: Lint
        run: pnpm turbo run lint --filter='...[HEAD^1]'

      - name: Validate Plugins
        run: pnpm run validate:plugins

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='...[HEAD^1]'

      - name: Run tests
        run: pnpm turbo run test --filter='...[HEAD^1]' -- --passWithNoTests --ci --testPathIgnorePatterns="api\.test\.ts|integration\.test\.ts"

      - name: Generate Dependency Graph
        if: always()
        run: pnpm turbo run build --filter='...[HEAD^1]' --graph=dependency-graph.html

      - name: Upload Dependency Graph
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-dependency-graph
          path: dependency-graph.html
          retention-days: 7